---
- name: 批量部署备份脚本和定时任务
  hosts: all
  become: yes
  tasks:
    - name: 上传备份脚本
      copy:
        src: files/backup.sh
        dest: /usr/local/bin/backup.sh
        mode: '0755'

    - name: 添加 crontab 定时任务（每天凌晨2点执行）
      cron:
        name: "daily web backup"
        job: "/usr/local/bin/backup.sh"
        hour: "2"
        minute: "0"
        state: present